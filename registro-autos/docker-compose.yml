services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: registro-autos-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD}"
    ports:
      - "${DB_PORT}:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped
volumes:
  sqlserver_data: