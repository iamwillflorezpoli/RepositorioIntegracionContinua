dist: jammy
language: java

jdk:
  - openjdk17

cache:
  directories:
    - $HOME/.m2
    - registro-autos/frontend/node_modules

before_install:
  - nvm install 20
  - nvm use 20

script:
  - cd $TRAVIS_BUILD_DIR/registro-autos/backend && mvn clean package -DskipTests
  - cd $TRAVIS_BUILD_DIR/registro-autos/frontend && npm ci && npm run build
